<!doctype html>
<html lang="el">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Δισκογραφικό Αρχείο{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='vendor/bootstrap.min.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <nav class="navbar navbar-expand-lg sticky-top app-nav">
    <div class="container-fluid">
      <a class="navbar-brand app-nav__brand" href="{{ url_for('main.dashboard') }}">
        <svg viewBox="0 0 32 32" aria-hidden="true">
          <circle cx="16" cy="16" r="15" fill="#1c140f"/>
          <circle cx="16" cy="16" r="6" fill="#8a2b23"/>
          <circle cx="16" cy="16" r="6" fill="none" stroke="#b1802f" stroke-width="1.2"/>
          <circle cx="16" cy="16" r="1.6" fill="#e7e3da"/>
        </svg>
        <span>Δισκογραφικό Αρχείο</span>
      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
              data-bs-target="#navmenu" aria-controls="navmenu"
              aria-expanded="false" aria-label="Εναλλαγή μενού">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navmenu">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="{{ url_for('main.dashboard') }}">Πίνακας</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('main.record', song_id=1) }}">Περιήγηση</a></li>
        </ul>

        <form class="d-flex app-nav__search" action="{{ url_for('main.search') }}"
              method="get" role="search">
          <input class="form-control" type="search" name="q" placeholder="Αναζήτηση…"
                 value="{{ request.args.get('q', '') }}" aria-label="Αναζήτηση">
          <button class="btn app-nav__searchbtn" type="submit" aria-label="Αναζήτηση">
            <svg viewBox="0 0 20 20" aria-hidden="true">
              <circle cx="8.5" cy="8.5" r="5.5" fill="none" stroke="currentColor" stroke-width="2"/>
              <line x1="12.5" y1="12.5" x2="18" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
        </form>
      </div>
    </div>
  </nav>

  {% with messages = get_flashed_messages() %}
    {% if messages %}
    <div class="flash" role="status">
      {% for m in messages %}<p>{{ m }}</p>{% endfor %}
    </div>
    {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}

  <script src="{{ url_for('static', filename='vendor/bootstrap.bundle.min.js') }}"></script>
</body>
</html>
