{% extends "base.html" %}
{% block title %}Διαχείριση — Σύνδεση{% endblock %}

{% block content %}
<main class="wrap wrap--admin">
  <div class="card admin-login mx-auto">
    <div class="card-body p-4">
      <p class="eyebrow">Διαχείριση</p>
      <h1 class="h5 mb-1">Σύνδεση</h1>
      <p class="text-muted small mb-3">Απαιτείται ο κωδικός διαχειριστή.</p>
      <form method="post" action="{{ url_for('main.admin_login', next=request.args.get('next', '')) }}">
        <div class="mb-3">
          <label class="form-label" for="pw">Κωδικός</label>
          <input class="form-control" type="password" id="pw" name="password" autofocus required>
        </div>
        <button class="btn btn-primary w-100" type="submit">Σύνδεση</button>
      </form>
    </div>
  </div>
</main>
{% endblock %}
